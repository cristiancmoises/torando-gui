# SPDX-License-Identifier: AGPL-3.0-only
# CI: lint + format-check + tests. The project is stdlib-only, so the only dev
# dependencies are ruff and pytest. Linux runs across the supported Python range
# in containers; Windows and macOS run the platform-portable suite (the iptables
# and resolv.conf tests skip themselves off Linux). Mirrored to .forgejo/.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ["python:3.11-slim", "python:3.12-slim", "python:3.13-slim"]
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dev tooling
        run: pip install --no-cache-dir ruff pytest
      - name: Lint (ruff check)
        run: ruff check .
      - name: Format check (ruff format --check)
        run: ruff format --check .
      - name: Tests (pytest)
        run: pytest tests/ -q

  crossplatform:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tooling
        run: pip install --no-cache-dir ruff pytest
      - name: Lint (ruff check)
        run: ruff check .
      - name: Format check (ruff format --check)
        run: ruff format --check .
      - name: Tests (pytest)
        run: pytest tests/ -q
