# SPDX-License-Identifier: AGPL-3.0-only
# Forgejo Actions CI (Codeberg and self-hosted Forgejo). Same recipe as the
# GitHub workflow. NB: `runs-on` must match a label your Forgejo runner offers;
# Codeberg's default is `docker`. Adjust if your runner uses a different label.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        image: ["python:3.11-slim", "python:3.12-slim", "python:3.13-slim"]
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dev tooling
        run: pip install --no-cache-dir ruff pytest
      - name: Lint (ruff check)
        run: ruff check .
      - name: Format check (ruff format --check)
        run: ruff format --check .
      - name: Tests (pytest)
        run: pytest tests/ -q
